<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Page Not Found - 404</title>
    <style>
        body {
            background: #f8f9fa;
            color: #333;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 60px;
        }
        .error-container {
            display: inline-block;
            padding: 40px 60px;
            background-color: transparent;
            border-radius: 12px;
        }
        h1 {
            font-size: 5em;
            margin: 0 0 10px 0;
            color: #ff1900ff;
        }
        h2 {
            margin: 0 0 20px 0;
            font-size: 2em;
        }
        p {
            font-size: 1.2em;
            margin-bottom: 30px;
        }
        a {
            color: #0099ffff;
            text-decoration: none;
            font-weight: bold;
        }
        a:hover {
            text-decoration: underline;
        }
        /* Loader styles */
        .loader-bar {
            width: 200px;
            height: 8px;
            background: #eee;
            border-radius: 4px;
            margin: 30px auto 0 auto;
            overflow: hidden;
            position: relative;
        }
        .loader-bar-inner {
            width: 0;
            height: 100%;
            background: linear-gradient(90deg, #3498db 0%, #6dd5fa 100%);
            border-radius: 4px;
            animation: loading-bar 1.5s infinite;
        }
        @keyframes loading-bar {
            0% { width: 0; }
            50% { width: 100%; }
            100% { width: 0; }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <h1>404</h1>
        <h2>Page Not Found</h2>
        <p>Sorry, the page you are looking for does not exist or has been moved.</p>
        <div class="loader-bar">
            <div class="loader-bar-inner"></div>
        </div>
    </div>
</body>
</html>
