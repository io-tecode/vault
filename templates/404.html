<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - 404</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes loading-bar {
            0% { width: 0; }
            50% { width: 100%; }
            100% { width: 0; }
        }
        .loader-bar-inner {
            animation: loading-bar 1.5s infinite;
        }
    </style>
</head>

<body class="bg-gradient-to-br from-gray-50 to-orange-50 min-h-screen flex items-center justify-center px-4">
    <div class="text-center">
        <div class="bg-white rounded-2xl shadow-xl border border-gray-100 p-12 max-w-2xl mx-auto">
            <div class="inline-flex items-center justify-center w-24 h-24 bg-gradient-to-br from-[#E01305] to-[#FA7305] rounded-full mb-6">
                <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                </svg>
            </div>
            <h1 class="text-7xl font-bold text-[#E01305] mb-4">404</h1>
            <h2 class="text-3xl font-semibold text-gray-900 mb-4">Page Not Found</h2>
            <p class="text-lg text-gray-600 mb-8">
                Sorry, the page you are looking for does not exist or has been moved.
            </p>
            <a href="/" 
               class="inline-flex items-center justify-center px-8 py-3 bg-gradient-to-r from-[#E01305] to-[#FA7305] text-white font-semibold rounded-lg shadow-lg hover:shadow-xl focus:outline-none focus:ring-4 focus:ring-[#FA7305] focus:ring-opacity-50 transition-all duration-200 transform hover:scale-105">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                </svg>
                Go Home
            </a>
            <div class="w-48 h-2 bg-gray-200 rounded-full mx-auto mt-8 overflow-hidden">
                <div class="h-full bg-gradient-to-r from-[#E01305] to-[#FA7305] rounded-full loader-bar-inner"></div>
            </div>
        </div>
        <div class="mt-8 text-gray-600">
            <p class="text-sm">
                Need help? 
                <a href="#" class="text-[#E01305] hover:text-[#FE3B15] font-semibold transition-colors duration-200">
                    Contact Support
                </a>
            </p>
        </div>
    </div>
</body>
</html>
