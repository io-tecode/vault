{% extends 'base.html' %}
{% load static %}
{% block head %}
    <title>Page not Found</title>
{% endblock %}
{% block content %}
<body class="min-h-screen flex items-center justify-center px-4">
    <div class="text-center">
        <div class="bg-white p-12 max-w-2xl mx-auto">
            <div class="inline-flex items-center justify-center w-24 h-24 mb-6 ">
            </div>
            <h1 class="text-7xl font-bold text-[#1156B0] mb-4">404</h1>
            <h2 class="text-3xl font-semibold text-gray-900 mb-4">Page Not Found</h2>
            <p class="text-lg text-gray-600 mb-8">
                Sorry, the page you are looking for does not exist or has been moved.
            </p>
            <a href="/" 
               class="inline-flex items-center justify-center px-8 py-3 bg-[#1156B0] text-white font-semibold rounded-lg shadow-lg hover:shadow-xl hover:bg-[#93BFEF] focus:outline-none focus:ring-4 focus:ring-[#93BFEF] focus:ring-opacity-50 transition-all duration-200 transform hover:scale-105">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                </svg>
                Go Home
            </a>
        </div>
    </div>
</body>
{% endblock%}
