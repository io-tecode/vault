{% extends 'base.html' %}
{% load static %}

{% block head %}
  {% comment %} <link rel="stylesheet" href="{% static 'authentication_app/style.css' %}"> {% endcomment %}
{% endblock %}

{% block content %}
<div>
    <div class="brand-icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect opacity="0.3" x="3" y="10" width="18" height="4" rx="2" fill="currentColor" />
        <rect x="7" y="10" width="10" height="4" rx="2" fill="currentColor" />
      </svg>
    </div>
    <h2>Verify Your Email</h2>
    <form method="post">
        {% csrf_token %}
        <label for="code">Enter your verification code:</label>
        <input type="text" id="code" name="code" maxlength="6" required>
        <button type="submit">Verify</button>
        {% if error %}
          <p style="color:red;">{{ error }}</p>
        {% endif %}
    </form>

</div>
{% endblock %}
