{% extends 'base.html' %}

{% block head %}
    <title>{{ poll_info.Name }} - Poll Info</title>
{% endblock %}

{% block content %}
<div class="bg-gradient-to-br from-lime-green-50 to-lime-green-100 min-h-screen py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-4xl mx-auto"> 
        <div class="mb-6">
            <a href="{% url 'voting:headline_detail' poll_info.headline.id %}" 
               class="inline-flex items-center text-lime-green-600 hover:text-lime-green-700 font-medium transition-colors duration-200">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                </svg>
                Back to Headline
            </a>
        </div> 
        <div class="bg-white rounded-2xl shadow-xl border border-lime-green-200 overflow-hidden">
            <div class="bg-gradient-to-r from-lime-green-600 to-lime-green-500 px-8 py-6">
                <div class="flex items-center">
                    <div class="inline-flex items-center justify-center w-12 h-12 bg-white rounded-full mr-4 shadow-lg">
                        <svg class="w-6 h-6 text-lime-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                        </svg>
                    </div>
                    <h1 class="text-3xl font-bold text-white">{{ poll_info.Name }}</h1>
                </div>
            </div> 
            <div class="px-8 py-8 space-y-6"> 
                <div class="bg-lime-green-50 border border-lime-green-200 rounded-lg p-6">
                    <div class="flex items-start">
                        <svg class="w-6 h-6 text-lime-green-600 mr-3 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/>
                        </svg>
                        <div>
                            <h3 class="text-sm font-semibold text-gray-600 uppercase tracking-wide mb-1">Sub-category</h3>
                            <p class="text-lg font-medium text-gray-900">{{ poll_info.sub_category }}</p>
                        </div>
                    </div>
                </div> 
                <div class="bg-gray-50 border border-gray-200 rounded-lg p-6">
                    <div class="flex items-start">
                        <svg class="w-6 h-6 text-lime-green-600 mr-3 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"/>
                        </svg>
                        <div>
                            <h3 class="text-sm font-semibold text-gray-600 uppercase tracking-wide mb-1">Associated Headline</h3>
                            <p class="text-lg font-medium text-gray-900">{{ poll_info.headline.title }}</p>
                        </div>
                    </div>
                </div> 
                <div class="pt-6 flex flex-col sm:flex-row gap-4">
                    <a href="{% url 'voting:headline_detail' poll_info.headline.id %}" 
                       class="flex-1 inline-flex items-center justify-center px-6 py-3 bg-gradient-to-r from-lime-green-600 to-lime-green-500 text-white font-semibold rounded-lg shadow-lg hover:shadow-xl hover:from-lime-green-700 hover:to-lime-green-600 focus:outline-none focus:ring-4 focus:ring-lime-green-500 focus:ring-opacity-50 transition-all duration-200 transform hover:scale-105">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                        </svg>
                        View Headline Details
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
