{% extends 'base.html' %}

{% block head %}
    <title>Thank You for Voting</title>
{% endblock %}

{% block content %}
    <div class="min-h-screen bg-gradient-to-br from-gray-50 to-orange-50 flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-md w-full">
            <div class="bg-white rounded-2xl shadow-xl border border-gray-100 p-8 text-center">
                <!-- Success Icon -->
                <div class="inline-flex items-center justify-center w-20 h-20 bg-gradient-to-br from-[#E01305] to-[#FA7305] rounded-full mb-6">
                    <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/>
                    </svg>
                </div>

                <!-- Title -->
                <h1 class="text-3xl font-bold text-gray-900 mb-4">Thank You!</h1>
                
                <!-- Message -->
                <p class="text-lg text-gray-600 mb-8">Your vote has been successfully recorded.</p>

                <!-- Dashboard Button -->
                <a href="{% url 'voting:x6sad_dashboard' %}" 
                   class="inline-flex items-center justify-center px-6 py-3 bg-gradient-to-r from-[#E01305] to-[#FA7305] text-white font-semibold rounded-lg shadow-lg hover:shadow-xl focus:outline-none focus:ring-4 focus:ring-[#FA7305] focus:ring-opacity-50 transition-all duration-200 transform hover:scale-105">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                    </svg>
                    Go to Dashboard
                </a>
            </div>
        </div>
    </div>
{% endblock %}
